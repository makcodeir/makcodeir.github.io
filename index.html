<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در دست احداث</title>
    <style>
        /* Reset margins and hide scrollbars */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Tahoma, Arial, sans-serif;
        }

        /* Styling the bouncing text */
        #bouncing-text {
            position: absolute;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff0000;
            white-space: nowrap;
            user-select: none;
            /* Will be animated using CSS transform for better performance */
            transform: translate(0px, 0px); 
        }
    </style>
</head>
<body>

    <div id="bouncing-text">در دست احداث</div>

    <script>
        const textElement = document.getElementById('bouncing-text');
        
        // Initial positions and velocities
        let x = Math.random() * (window.innerWidth - 200);
        let y = Math.random() * (window.innerHeight - 50);
        let dx = 3; // Horizontal speed
        let dy = 3; // Vertical speed

        // Array of colors to switch between on bounce
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffffff'];
        
        function changeColor() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            textElement.style.color = randomColor;
        }

        function animate() {
            const rect = textElement.getBoundingClientRect();

            // Check for collision with right or left borders
            if (x + rect.width >= window.innerWidth || x <= 0) {
                dx = -dx; // Reverse horizontal direction
                changeColor();
            }

            // Check for collision with bottom or top borders
            if (y + rect.height >= window.innerHeight || y <= 0) {
                dy = -dy; // Reverse vertical direction
                changeColor();
            }

            // Update position
            x += dx;
            y += dy;

            // Apply the new position
            textElement.style.transform = `translate(${x}px, ${y}px)`;

            // Call the next frame
            requestAnimationFrame(animate);
        }

        // Start the animation
        requestAnimationFrame(animate);

        // Handle window resize to prevent text from getting stuck outside
        window.addEventListener('resize', () => {
            const rect = textElement.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width;
            if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height;
            if (x < 0) x = 0;
            if (y < 0) y = 0;
        });
    </script>
</body>
</html>
